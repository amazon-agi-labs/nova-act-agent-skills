name: Lint

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'powers/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g skills-ref

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: make check

